<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4PL IC50 計算機 (Levenberg-Marquardt)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            max-width: 650px;
            margin: 2rem auto;
            padding: 1rem;
            background-color: #f4f6f9;
            color: #333;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
        th, td { border: 1px solid #dee2e6; padding: 0.75rem; text-align: center; }
        th { background-color: #e9ecef; }
        input[type="number"] { width: 80%; padding: 0.25rem; text-align: center; }
        .btn { padding: 0.5rem 1rem; cursor: pointer; border: none; border-radius: 4px; font-size: 1rem; }
        .btn-calc { background: #28a745; color: white; width: 100%; font-size: 1.1rem; padding: 0.75rem; margin-top: 1rem; }
        .btn-calc:hover { background: #218838; }
        .result-box { margin-top: 1.5rem; padding: 1rem; background: #e8f4f8; border-left: 5px solid #17a2b8; display: none; }
        .param-list { font-size: 0.9em; color: #555; margin-top: 0.5rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>4PL IC50 非線性迴歸計算機</h2>
    <p>採用 Levenberg-Marquardt 演算法擬合 4-Parameter Logistic 曲線。</p>
    
    <table id="dataTable">
        <thead>
            <tr>
                <th>藥物濃度</th>
                <th>存活率 (%)</th>
            </tr>
        </thead>
        <tbody>
            <tr><td><input type="number" step="any" class="conc" value="0.1"></td><td><input type="number" step="any" class="viab" value="99.5"></td></tr>
            <tr><td><input type="number" step="any" class="conc" value="1"></td><td><input type="number" step="any" class="viab" value="88.2"></td></tr>
            <tr><td><input type="number" step="any" class="conc" value="10"></td><td><input type="number" step="any" class="viab" value="48.5"></td></tr>
            <tr><td><input type="number" step="any" class="conc" value="100"></td><td><input type="number" step="any" class="viab" value="15.3"></td></tr>
            <tr><td><input type="number" step="any" class="conc" value="1000"></td><td><input type="number" step="any" class="viab" value="2.1"></td></tr>
        </tbody>
    </table>

    <button id="calcBtn" class="btn btn-calc">執行 4PL 擬合計算 IC50</button>
    <div id="resultBox" class="result-box"></div>
</div>

<script type="module">
    // 透過 Skypack 動態引入 LM 演算法
    import LM from 'https://cdn.skypack.dev/ml-levenberg-marquardt';

    // 定義 4PL 數學模型
    // 參數陣列: [Bottom, Top, logIC50, HillSlope]
    function fourPL([bottom, top, logIC50, hillSlope]) {
        return (x) => bottom + (top - bottom) / (1 + Math.pow(10, (x - logIC50) * hillSlope));
    }

    document.getElementById('calcBtn').addEventListener('click', () => {
        const rows = document.querySelectorAll('#dataTable tbody tr');
        let xData = [];
        let yData = [];

        // 1. 解析輸入數據
        rows.forEach(row => {
            const c = parseFloat(row.querySelector('.conc').value);
            const v = parseFloat(row.querySelector('.viab').value);
            if (!isNaN(c) && !isNaN(v) && c > 0) {
                xData.push(Math.log10(c)); // X 軸必須為對數濃度
                yData.push(v);             // Y 軸為存活率
            }
        });

        const resultBox = document.getElementById('resultBox');
        resultBox.style.display = 'block';

        if (xData.length < 4) {
            resultBox.innerHTML = "<span style='color:red;'>錯誤：4PL 模型有 4 個參數，至少需要 4 個有效的數據點才能擬合。</span>";
            return;
        }

        const data = { x: xData, y: yData };

        // 2. 初始值猜測 (Initial Guess) - 這是非線性迴歸能否收斂的關鍵
        const minY = Math.min(...yData);
        const maxY = Math.max(...yData);
        
        // 估算反曲點 (找最靠近 (Top+Bottom)/2 的點)
        const midY = (maxY + minY) / 2;
        let closestX = xData[0];
        let minDiff = Math.abs(yData[0] - midY);
        for(let i = 1; i < xData.length; i++){
            let diff = Math.abs(yData[i] - midY);
            if(diff < minDiff) { minDiff = diff; closestX = xData[i]; }
        }

        const initialValues = [
            minY,      // Guess for Bottom
            maxY,      // Guess for Top
            closestX,  // Guess for logIC50
            1.0        // Guess for HillSlope (正值表示存活率隨濃度增加而下降)
        ];

        // 3. 設定 LM 演算法參數
        const options = {
            damping: 1.5,
            initialValues: initialValues,
            maxIterations: 1000,
            errorTolerance: 10e-5
        };

        // 4. 執行擬合
        try {
            const fitted = LM(data, fourPL, options);
            const [fitBottom, fitTop, fitLogIC50, fitSlope] = fitted.parameterValues;
            
            // 5. 反對數推回實際 IC50 濃度
            const ic50 = Math.pow(10, fitLogIC50);
            const r2 = calculateR2(data, fitted.parameterValues);

            resultBox.innerHTML = `
                <div style="font-size:1.2em; margin-bottom: 10px;">
                    擬合成功！<br>
                    <span style="font-size:1.5em; font-weight:bold; color:#d35400;">IC50 = ${ic50.toFixed(4)}</span>
                </div>
                <div class="param-list">
                    <strong>4PL 模型參數細節：</strong><br>
                    R² (判定係數) = ${r2.toFixed(4)}<br>
                    LogIC50 = ${fitLogIC50.toFixed(4)}<br>
                    Top = ${fitTop.toFixed(2)} %<br>
                    Bottom = ${fitBottom.toFixed(2)} %<br>
                    HillSlope = ${fitSlope.toFixed(4)}
                </div>
            `;
        } catch (error) {
            resultBox.innerHTML = `<span style='color:red;'>擬合失敗，資料點可能無法收斂：${error.message}</span>`;
        }
    });

    // 輔助函式：計算 R平方值，評估擬合優度
    function calculateR2(data, params) {
        const func = fourPL(params);
        let ssTot = 0, ssRes = 0;
        const yMean = data.y.reduce((a, b) => a + b, 0) / data.y.length;
        
        for (let i = 0; i < data.x.length; i++) {
            const yPred = func(data.x[i]);
            const yActual = data.y[i];
            ssTot += Math.pow(yActual - yMean, 2);
            ssRes += Math.pow(yActual - yPred, 2);
        }
        return 1 - (ssRes / ssTot);
    }
</script>

</body>
</html>
